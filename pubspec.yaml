name: app_xisti
description: "XISTI — movilidad urbana (pasajero + conductor)"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# Change version and version code with 3 digits number
# ex. 1.0.1+1
# ex. 1.0.5+5
# ex. 1.1.0+10
version: 1.0.3+30

# Used Flutter SDK 3.41.2
environment:
  sdk: '>=3.8.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter


  rxdart: 0.28.0
  dio: 5.9.1
  flutter_pretty_dio_logger: 3.0.0
  flutter_svg: 2.2.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  google_fonts: 8.0.2
  dart_ipify: 1.1.1
  intl: 0.20.2
  firebase_messaging: 16.1.1
  firebase_database: 12.1.3
  firebase_core: 4.4.0
  firebase_auth: 6.1.4
  firebase_crashlytics: 5.0.7
  image_picker: 1.2.1
  flutter_image_compress: 2.4.0
  image_cropper: 11.0.0
  timezone: 0.10.1
  flutter_timezone: 5.0.1
  google_maps_flutter: 2.14.2
  google_maps_flutter_android: 2.19.1
  google_maps_flutter_platform_interface: 2.14.2
  google_maps_flutter_ios_sdk10: 2.17.5
  flutter_screenutil: 5.9.3
  flutter_local_notifications: 20.1.0
  flutter_secure_storage: ^9.2.4
  crypto: 3.0.7
  connectivity_plus: 7.0.0
  url_launcher: 6.3.2
  geolocator: 14.0.2
  geocoding: 4.0.0
  carousel_slider: 5.1.2
  google_sign_in: 7.2.0
  flutter_facebook_auth: 7.1.5
  sign_in_with_apple: 7.0.1
  local_auth: 3.0.1
  local_auth_android: 2.0.5
  local_auth_darwin: 2.0.3
  smart_auth: 3.2.0
  pin_code_fields: 9.1.0
  package_info_plus: 9.0.0
  wakelock_plus: 1.4.0
  shimmer: 3.0.0
  flutter_animarker: 3.2.0
  flutter_cache_manager: 3.4.1
  flutter_native_contact_picker: 0.0.11
  auto_size_text: 3.0.0
  background_location_tracker: 1.6.1
  flutter_rating_bar: 4.0.1
  focus_detector_v2: 3.1.0+1
  permission_handler: 12.0.1
  lottie: any
  flutter_inappwebview: 6.1.5
  readmore: 3.0.0
  infinite_scroll_pagination: 5.1.1
  action_slider: 0.7.0
  just_audio: 0.10.5
  vibration: 3.1.3
  shared_preferences: 2.5.4
  appcheck: 1.7.0
  share_plus: 12.0.1
  map_launcher: 4.4.3
  external_path: 2.2.0
  background_downloader: 9.5.3
  path_provider: 2.1.5
  http: 1.6.0
  collection: 1.19.1
  file_picker: 10.3.10
  photo_view: 0.15.0
  android_nav_setting: 0.0.2+2 # need to update package in future for android 36.
  device_info_plus: 12.3.0
  path: 1.9.1
  camera: 0.12.0
  google_mlkit_face_detection: 0.13.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: launcher_icon
  ios: true
  image_path: assets/images/xisti/app_launcher.png
  adaptive_icon_background: "#0B0B0B"
  adaptive_icon_foreground: assets/images/xisti/app_launcher_foreground.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0B0B0B"
  background_image: assets/images/splash_bg.png
  image: assets/images/xisti/logo_full.png
  android_gravity: center
  ios_content_mode: scaleAspectFit
  android: true
  ios: true
  android_12:
    color: "#0B0B0B"
    image: assets/images/xisti/logo_full.png
    icon_background_color: "#0B0B0B"


# The following section is specific to Flutter packages.
flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/payment_methods/
    - assets/images/xisti/
#    - assets/gifs/
    - assets/images/light/
    - assets/images/dark/
    - assets/svgs/
    - assets/flags/
    - assets/json/
    - assets/audio/
    - assets/mapStyle/
    - assets/lottieJson/light/
    - assets/lottieJson/dark/


  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/CustomIcons.ttf